name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build .mcpb bundles
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          for pair in darwin-arm64 darwin-amd64 linux-arm64 linux-amd64 windows-amd64; do
            OS="${pair%-*}"
            ARCH="${pair#*-}"
            ARCHIVE=$(find dist -maxdepth 1 -type d -name "*${OS}*${ARCH}*" | head -1)
            BIN="frisco"
            [ "$OS" = "windows" ] && BIN="frisco.exe"
            if [ -z "$ARCHIVE" ] || [ ! -f "$ARCHIVE/$BIN" ]; then
              echo "Skipping ${pair}: binary not found"
              continue
            fi
            BUNDLE="frisco-${pair}.mcpb"
            BDIR=$(mktemp -d)
            jq --arg v "$TAG" '.version = $v' manifest.json > "$BDIR/manifest.json"
            mkdir -p "$BDIR/server"
            cp "$ARCHIVE/$BIN" "$BDIR/server/$BIN"
            (cd "$BDIR" && zip -r "$OLDPWD/dist/$BUNDLE" manifest.json server/)
            rm -rf "$BDIR"
            echo "Built $BUNDLE"
          done

      - name: Upload .mcpb bundles to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          for f in dist/*.mcpb; do
            [ -f "$f" ] || continue
            gh release upload "$TAG" "$f" --clobber
            echo "Uploaded $(basename "$f")"
          done
